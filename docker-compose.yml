version: '3.8'

services:
  rtmp-server:
    build: .
    container_name: rtmp-server
    restart: unless-stopped
    ports:
      - "1935:1935" # RTMP Ingestion Port
    volumes:
      - media-volume:/usr/src/app/media
    networks:
      - stream-network

  nginx:
    image: nginx:alpine
    container_name: rtmp-nginx
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP Port
      - "443:443" # HTTPS Port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - rtmp-server
    networks:
      - stream-network

  certbot:
    image: certbot/certbot
    container_name: rtmp-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - stream-network

volumes:
  media-volume:

networks:
  stream-network:
    driver: bridge
